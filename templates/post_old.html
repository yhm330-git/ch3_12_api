{% extends "base.html" %}
{% block title %}
<title>學生資料管理系統-新增資料</title>
<style>
    h1, h3{
    text-align: center;
    }
    table{
        margin-left: auto;
        margin-right: auto;
    }
    table, th, td{
        border: 1px solid black;
        border-collapse: collapse;
    }
</style>
{% endblock  %}

{% block content %}
<div>
    <h1 class="title">學生資料管理系統-新增資料</h1>
    {% comment %} <a href="/index/"><h3>回首頁</h3></a> {% endcomment %}
    <a href="{% url 'index' %}"><h3>回首頁</h3></a> 
</div>

<div>
 {% comment %} <form action="/post/" method="post"> {% endcomment %}
 <form action="{% url 'post' %}" method="post">
        {% csrf_token %}
        <table>
            <tr>
                <th>*姓名</th>
                <td><input type="text" id="cname" name="cname" required placeholder="請輸入姓名"></td>
            </tr>

            <tr>
                <th>*性別</th>
                <td>
                    <input type="radio" id="csex_m" name="csex" value="M" checked>
                    <label for="csex_m">男</label>
                    <input type="radio" id="csex_f" name="csex" value="F">
                    <label for="csex_f">女</label>
                </td>
            </tr>
            <tr>
                <th>*生日</th>
                <td><input type="date" id="cbirthday" name="cbirthday" required></td>
            </tr>
            <tr>
                <th>*信箱</th>
                <td><input type="email" id="cemail" name="cemail" required placeholder="請輸入mail"></td>
            </tr>
            <tr>
                <th>&nbsp;&nbsp;電話</th>
                <td><input type="text" id="cphone" name="cphone" placeholder="請輸入電話"></td>
            </tr>
            <tr>
                <th>&nbsp;&nbsp;地址</th>
                <td><input type="text" id="caddr" name="caddr" placeholder="請輸入地址"></td>
            </tr>
            <tr>
                <th colspan="2" style="text-align: center;">
                    <input type="submit" name="submitbutton" value="儲存">
                    <input type="reset" name="resetButton" value="重置">
                </th>
            </tr>

        </table>
    </form>
</div>
{% endblock  %}
